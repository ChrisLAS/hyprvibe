# hypridle configuration
listener {
	# Keep hypridle resident for lock/sleep hooks without automatic display poweroff.
	timeout = 86400
	on-timeout = true
}

general {
	lock_cmd = pidof hyprlock || hyprlock
	before_sleep_cmd = loginctl lock-session
	after_sleep_cmd = /home/chrisf/.config/hypr/scripts/wake-monitors.sh
}
